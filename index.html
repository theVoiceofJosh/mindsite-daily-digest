cket'\u2014AI Chatbots Growing Before Regulators Can Catch Up", "url": "https://www.washingtonpost.com/health/2026/04/19/chatbot-therapy-mental-health-regulations/", "source": "Washington Post", "topic": "AI and Chatbot Therapy", "topicId": "ai-chatbot-therapy", "tier": 1, "top": false, "pubDate": "April 19, 2026", "region": null, "policy": false, "legislation": false, "cj": false, "cjType": null, "cjTags": [], "summary": "A Washington Post investigation examines how AI chatbots are becoming de facto mental health providers without adequate safeguards\u2014raising concerns about privacy breaches, unsafe crisis handling, and vulnerable users seeking clinical-level support from tools built for casual conversation. The piece charts the regulatory gap as states scramble to respond with new legislation."}, {"title": "STAT News: Trump Proposes Further Medicaid Cuts Targeting State-Directed Payments", "url": "https://www.statnews.com/2026/05/22/medicaid-state-directed-payments-trump-proposes-more-cuts/", "source": "STAT News", "topic": "Medicaid and Mental Health Access", "topicId": "medicaid-mh", "tier": 2, "top": false, "pubDate": "May 22, 2026", "region": null, "policy": true, "legislation": false, "cj": false, "cjType": null, "cjTags": [], "summary": "The Trump administration is pushing additional Medicaid cuts targeting state-directed payments, on top of the estimated $1 trillion in cuts already enacted through the One Big Beautiful Bill. Behavioral health providers that rely heavily on Medicaid face potentially severe reimbursement reductions, with services for mental illness and substance use disorder among the most vulnerable."}, {"title": "Stateline: Medicaid Cuts Could Severely Strain Already-Stressed Psychiatric Units", "url": "https://stateline.org/2026/03/23/medicaid-cuts-could-add-pressure-to-already-stressed-psychiatric-units/", "source": "Stateline", "topic": "Medicaid and Mental Health Access", "topicId": "medicaid-mh", "tier": 2, "top": false, "pubDate": n makes the data publicly available for the first time."}, {"title": "Executive Order Directs FDA and HHS to Accelerate Treatments for Serious Mental Illness", "url": "https://www.whitehouse.gov/presidential-actions/2026/04/accelerating-medical-treatments-for-serious-mental-illness/", "source": "White House", "topic": "SAMHSA and Federal MH Agencies", "topicId": "samhsa-fed-mh-agencies", "tier": 1, "top": false, "pubDate": "April 18, 2026", "region": null, "policy": true, "legislation": false, "cj": false, "cjType": null, "cjTags": [], "summary": "President Trump signed an executive order directing HHS and the FDA to accelerate access to treatments for serious mental illness, including expanded clinical trials and data sharing on psychedelic drugs in collaboration with the VA. Mental health researchers offered mixed reactions, welcoming focus on innovation while questioning simultaneous cuts to behavioral health infrastructure."}, {"title": "Trump Administration Rolls Back Biden-Era Mental Health Parity Enforcement Rules", "url": "https://updates.apaservices.org/new-policies-affecting-access-to-mental-health-care", "source": "APA Services", "topic": "Insurance Coverage, Denials, and Parity", "topicId": "insurance-denials-parity", "tier": 1, "top": false, "pubDate": "2026", "region": null, "policy": true, "legislation": false, "cj": false, "cjType": null, "cjTags": [], "summary": "The Trump administration announced it will not enforce Biden-era mental health parity regulations that strengthened requirements for insurers to cover mental health and substance use disorders on par with physical health conditions, while still enforcing 2021 rules. Mental health advocates warn the rollback will widen access gaps and undermine insurer accountability."}, {"title": "Georgia Fines 22+ Insurance Companies $20M for Mental Health Parity Violations", "url": "https://www.thekennedyforum.org/blog/states-step-up-holding-insurers-accountable-for-mental-health-parity-violations/", "sou const REGION_LABELS = {'bay-area':'Bay Area','chicago':'Chicago','new-york':'New York'};

function tagHTML(story) {
  let t = '';
  if (story.source) t += `<span class="tag source">${story.source}</span>`;
  if (story.pubDate) t += ` <span class="tag date">${story.pubDate}</span>`;
  if (story.tier === 1) t += ' <span class="tag tier1">Tier 1</span>';
  if (story.cj) t += ` <span class="tag cj">CJ${story.cjType ? ':'+story.cjType : ''}</span>`;
  if (story.policy) t += ' <span class="tag policy">Policy</span>';
  if (story.legislation) t += ' <span class="tag legislation">Legislation</span>';
  if (story.region) t += ` <span class="tag region">${REGION_LABELS[story.region]||story.region}</span>`;
  return t;
}

function cardHTML(story) {
  return `<div class="story-card ${story.top ? 'top' : ''}" data-topic="${story.topicId||''}" data-cj="${story.cj?'1':''}" data-policy="${story.policy?'1':''}" data-legislation="${story.legislation?'1':''}" data-region="${story.region||''}" data-title="${(story.title||'').toLowerCase()}" data-summary="${(story.summary||'').toLowerCase()}" data-source="${(story.source||'').toLowerCase()}">
    <div class="topic">${story.topic||''}</div>
    <h3><a href="${story.url}" target="_blank" rel="noopener">${story.title}</a></h3>
    <div class="summary">${story.summary||''}</div>
    <div class="meta-row">${tagHTML(story)}</div>
  </div>`;
}

function populateTopics() {
  const topics = [...new Set(DIGEST.stories.map(s => s.topic).filter(Boolean))].sort();
  const sel = document.getElementById('filter-topic');
  topics.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}

function render() {
  const topic = document.getElementById('filter-topic').value;
  const type = document.getElementById('filter-type').value;
  const region = document.getElementById('filter-region').value;
  const kw = document.getElementById('search-text').value.trim().toLowerCase();

  const filtered = DIGEST.stories.filter(s => {
    if (topic && s.topic !== topic) return false;
    if (type === 'cj' && !s.cj) return false;
    if (type === 'policy' && !s.policy) return false;
    if (type === 'legislation' && !s.legislation) return false;
    if (region && s.region !== region) return false;
    if (kw && !(
      (s.title||'').toLowerCase().includes(kw) ||
      (s.summary||'').toLowerCase().includes(kw) ||
      (s.source||'').toLowerCase().includes(kw)
    )) return false;
    return true;
  });

  const topStories = filtered.filter(s => s.top);
  const allStories = filtered.filter(s => !s.top);

  document.getElementById('top-grid').innerHTML = topStories.map(cardHTML).join('');
  document.getElementById('all-grid').innerHTML = allStories.map(cardHTML).join('');
  document.getElementById('top-section').style.display = topStories.length ? '' : 'none';
  document.getElementById('story-count').textContent = `${filtered.length} of ${DIGEST.storyCount} stories`;
}

populateTopics();
render();
document.getElementById('filter-topic').addEventListener('change', render);
document.getElementById('filter-type').addEventListener('change', render);
document.getElementById('filter-region').addEventListener('change', render);
document.getElementById('search-text').addEventListener('input', render);
</script>
